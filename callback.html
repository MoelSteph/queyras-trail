<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Strava</title>
<style>
body{font-family:system-ui,sans-serif;background:#faf6f0;color:#2c1f0e;display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px;margin:0;}
.card{background:#fff;border-radius:16px;padding:28px 24px;max-width:380px;width:100%;border:1px solid rgba(180,130,80,0.2);text-align:center;}
h1{font-size:1.1rem;margin-bottom:8px;color:#d4631a;}
p{font-size:.84rem;color:#7a5c3a;line-height:1.6;margin-bottom:20px;}
.code-box{background:#f5ede0;border:2px solid #d4631a;border-radius:10px;padding:14px;font-family:monospace;font-size:1rem;word-break:break-all;color:#2c1f0e;margin-bottom:16px;cursor:pointer;user-select:all;}
.copy-btn{background:#d4631a;color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:.9rem;font-weight:500;cursor:pointer;width:100%;margin-bottom:10px;}
.copy-btn:active{opacity:.85;}
.hint{font-size:.72rem;color:#b08d68;}
.ok{color:#2e7d32;font-weight:500;font-size:.84rem;display:none;}
</style>
</head>
<body>
<div class="card">
  <h1>✓ Strava autorisé</h1>
  <p>Appuie sur le bouton pour copier ton code, puis retourne sur l'app et colle-le dans le champ.</p>
  <div class="code-box" id="code-display">Chargement…</div>
  <button class="copy-btn" onclick="copyCode()">Copier le code</button>
  <div class="ok" id="ok-msg">✓ Copié ! Retourne sur l'app.</div>
  <p class="hint">Ensuite : retourne sur l'app → colle le code → Valider</p>
  <a href="https://stupendous-cocada-62e7d6.netlify.app" style="display:block;margin-top:14px;font-size:.78rem;color:#d4631a;">← Retour sur l'app</a>
</div>
<script>
const code=new URLSearchParams(window.location.search).get('code');
const el=document.getElementById('code-display');
if(code){el.textContent=code;}
else{el.textContent='Aucun code trouvé — réessaie';el.style.borderColor='#c0392b';}
function copyCode(){
  if(!code)return;
  navigator.clipboard.writeText(code).then(()=>{
    document.getElementById('ok-msg').style.display='block';
    document.querySelector('.copy-btn').textContent='✓ Copié !';
  }).catch(()=>{
    el.focus();document.execCommand('selectAll');document.execCommand('copy');
    document.getElementById('ok-msg').style.display='block';
  });
}
</script>
</body>
</html>
